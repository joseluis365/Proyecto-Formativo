[phases.setup]
nixPkgs = ["php", "composer", "nodejs"]

[phases.build]
cmds = [
  "cd api",
  "composer install --no-dev --optimize-autoloader",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "cd api && php artisan serve --host=0.0.0.0 --port=$PORT"